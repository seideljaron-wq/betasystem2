name: Build BetaPlugin

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: BetaPlugin

      - name: Build with Gradle
        run: ./gradlew build
        working-directory: BetaPlugin

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: BetaPlugin-JAR
          path: BetaPlugin/build/libs/BetaPlugin-*.jar
